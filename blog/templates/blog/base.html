<!DOCTYPE html>

<html>
<head>

{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<title>🕰️ Ecos del Tiempo 🕰️</title>

</head>
<body>
    <header>
        <h1>🕰️ Ecos del Tiempo 🕰️</h1>
        <hr>

<nav class="navbar">
    <h1 class="logo">Ecos del Tiempo</h1>

    <div class="nav-links">

        <a href="/">Inicio</a>
        <a href="/pages/">Ecos</a>
        <a href="/about/">Sobre Mi</a>

        {% if user.is_authenticated %}
            <a href="/messages/">Mensajes</a>
            <a href="/accounts/profile/">Perfil</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn">Cerrar sesion</button>
</form>
        {% else %}
            <a href="/accounts/login/">Iniciar Sesión</a>
            <a href="/accounts/signup/">Registrarse</a>
        {% endif %}

    </div>
</nav>
    </header>

<div class="container">

{% block contenido %}

{% endblock %}

</div>
</body>
</html>
